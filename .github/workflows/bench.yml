name: Bench

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "Pull request number to report results to"
        required: true
      base_sha:
        description: "Exact base commit SHA to compare against"
        required: true
      sha:
        description: "Exact commit SHA to benchmark"
        required: true
      head_repo:
        description: "owner/repo containing the commit SHA"
        required: true

jobs:
  bench:
    runs-on: [self-hosted, linux, x64, clean-bench]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write

    steps:
      - name: Mark benchmark running
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ inputs.sha }}" \
            -f state=pending \
            -f context=bench \
            -f description="Build benchmark running" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Check out benchmark scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: bench-control
      - name: Run benchmark in container
        working-directory: bench-control
        env:
          BENCH_PR: ${{ inputs.pr }}
          BENCH_BASE_SHA: ${{ inputs.base_sha }}
          BENCH_SHA: ${{ inputs.sha }}
          BENCH_HEAD_REPO: ${{ inputs.head_repo }}
          BENCH_REPOSITORY: ${{ github.repository }}
          BENCH_RUN_ID: ${{ github.run_id }}
          BENCH_OUTPUT_DIR: ${{ github.workspace }}/bench-output
          BENCH_HEARTBEATS: "1"
        run: scripts/bench/runner/run-in-docker.sh
      - name: Copy measurements
        if: always()
        run: |
          if [ -f "$GITHUB_WORKSPACE/bench-output/baseline.jsonl" ]; then
            cp "$GITHUB_WORKSPACE/bench-output/baseline.jsonl" baseline.jsonl
          fi
          if [ -f "$GITHUB_WORKSPACE/bench-output/current.jsonl" ]; then
            cp "$GITHUB_WORKSPACE/bench-output/current.jsonl" current.jsonl
          fi
      - name: Render benchmark report
        if: always() && hashFiles('current.jsonl') != ''
        run: |
          if [ -f baseline.jsonl ]; then
            bench-control/scripts/bench/report.py current.jsonl baseline.jsonl --limit 10 > benchmark-report.md
            bench-control/scripts/bench/report.py current.jsonl baseline.jsonl --all-modules > benchmark-modules.md
          else
            bench-control/scripts/bench/report.py current.jsonl --limit 10 > benchmark-report.md
            bench-control/scripts/bench/report.py current.jsonl --all-modules > benchmark-modules.md
          fi
          cat benchmark-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment on PR
        if: always() && hashFiles('benchmark-report.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('benchmark-report.md', 'utf8');
            const compareUrlTail = `${context.repo.owner}/${context.repo.repo}/compare/${{ inputs.base_sha }}..${{ inputs.sha }}`;
            const compareUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/compare/${{ inputs.base_sha }}..${{ inputs.sha }}`;
            const body = [
              '<!-- clean-build-benchmark -->',
              '',
              `Benchmark completed for [${compareUrlTail}](${compareUrl})! ⏱️`,
              '',
              report,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.pr }}'),
              body,
            });
      - name: Upload benchmark measurements
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-report
          path: |
            benchmark-report.md
            benchmark-modules.md
          if-no-files-found: warn
      - name: Mark benchmark complete
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          case "$JOB_STATUS" in
            success)
              state=success
              description="Build benchmark completed"
              ;;
            cancelled)
              state=error
              description="Build benchmark cancelled"
              ;;
            *)
              state=failure
              description="Build benchmark failed"
              ;;
          esac
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ inputs.sha }}" \
            -f state="$state" \
            -f context=bench \
            -f description="$description" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
